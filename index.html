<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para mi persona favorita <3</title>
      <link rel="apple-touch-icon" href="https://tu-usuario.github.io/tu-repositorio/icono.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        // Configuración inicial
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            
            // Cantidad optimizada para que NO haya lag en móvil (85 partículas)
            for (let i = 0; i < 85; i++) { 
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.t = Math.random() * Math.PI * 2; // Posición aleatoria en la curva
                this.size = Math.random() * 5 + 13;   // Tamaño de letra equilibrado
                this.speed = 0.007 + Math.random() * 0.01; // Velocidad suave
            }

            draw() {
                // Ecuación paramétrica del corazón
                const sinT = Math.sin(this.t);
                const xRaw = 16 * Math.pow(sinT, 3);
                const yRaw = -(13 * Math.cos(this.t) - 5 * Math.cos(2 * this.t) - 2 * Math.cos(3 * this.t) - Math.cos(4 * this.t));
                
                // Efecto de latido global (Pulse)
                const pulse = 1 + Math.sin(Date.now() * 0.002) * 0.06;
                
                // Ajuste de escala para que quepa bien en la pantalla del móvil
                const scale = Math.min(width, height) / 40;
                const x = width / 2 + xRaw * scale * pulse;
                const y = height / 2 + yRaw * scale * pulse;

                // Dibujar cada "I love you"
                ctx.fillStyle = "#ff2d55"; // Color rojo vibrante
                ctx.font = `bold ${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText("I love you", x, y);
                
                this.t += this.speed; // Movimiento
            }
        }

        function animate() {
            // Fondo negro puro
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            // --- DIBUJAR LA 'A' EN EL CENTRO ---
            ctx.save();
            ctx.fillStyle = '#ff2d55';
            ctx.font = 'bold 120px Arial'; // Letra A grande
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Brillo tipo Neón para la letra A
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#ff0040';
            
            // Un pequeño efecto de escala para que la A también "lata"
            const beatA = 1 + Math.sin(Date.now() * 0.002) * 0.03;
            ctx.translate(width / 2, height / 2);
            ctx.scale(beatA, beatA);
            ctx.fillText('A', 0, 0);
            ctx.restore();
            // ----------------------------------

            // Dibujar las partículas (I love you)
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
            }
            
            requestAnimationFrame(animate);
        }

        // Reajustar si se gira el teléfono
        window.addEventListener('resize', init);
        
        init();
        animate();
    </script>
</body>
</html>
